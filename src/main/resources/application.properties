spring.application.name=retroai-backend
server.port=8081

# H2 (default dev)
spring.datasource.url=jdbc:h2:mem:retroai;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.platform=h2

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
app.jwt.secret=ChangeThisToALongRandomSecretKeyAtLeast64BytesLongForHS512AlgorithmRetroAI
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=*

# AI provider
ai.provider=anthropic
ai.api.key=${AI_API_KEY:}
ai.model=claude-haiku-4-5-20251001
ai.base-url=https://api.anthropic.com/v1/messages
ai.timeout-ms=30000

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Atlassian OAuth (3LO)
atlassian.oauth.client-id=${ATLASSIAN_CLIENT_ID:}
atlassian.oauth.client-secret=${ATLASSIAN_CLIENT_SECRET:}
atlassian.oauth.redirect-uri=${ATLASSIAN_REDIRECT_URI:http://localhost:8081/api/auth/atlassian/callback}
atlassian.oauth.authorize-url=https://auth.atlassian.com/authorize
atlassian.oauth.token-url=https://auth.atlassian.com/oauth/token
atlassian.oauth.userinfo-url=https://api.atlassian.com/me
atlassian.oauth.scope=read:me read:account
# After successful Atlassian OAuth, redirect user straight to the board page.
# Token is appended as both a query string and a URL fragment for SPA compatibility.
# Default points at the deployed frontend; override with ATLASSIAN_FRONTEND_SUCCESS_URL for local dev.
atlassian.oauth.frontend-success-url=${ATLASSIAN_FRONTEND_SUCCESS_URL:https://test.epochmaster.us/board}

# Cookie settings for the JWT (used by /api/auth/me etc.)
# Cookie-domain empty → cookie is set on the backend host only. For cross-subdomain
# (e.g. api.epochmakers.us → app.epochmakers.us) set it to .epochmakers.us.
app.auth.cookie-domain=${AUTH_COOKIE_DOMAIN:}
app.auth.cookie-secure=${AUTH_COOKIE_SECURE:true}

# Public base URL for the frontend — used to build guestJoinUrl
# Default points at the deployed frontend; override with APP_FRONTEND_BASE_URL for local dev.
app.frontend.base-url=${APP_FRONTEND_BASE_URL:https://test.epochmaster.us}
