<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>RetroAI — Giriş</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background:#f5f5f5; font-family:system-ui,sans-serif; }
  .auth-card { max-width:420px; margin:80px auto; background:#fff; border:1px solid #ddd; padding:32px; border-radius:6px; }
  .logo { color:#444; font-size:26px; font-weight:700; text-align:center; margin-bottom:24px; }
  .atlassian-btn { background:#fff; border:1px solid #888; color:#222; }
  .atlassian-btn:hover { background:#f0f0f0; }
  .divider { display:flex; align-items:center; margin:18px 0; color:#888; font-size:12px; }
  .divider::before, .divider::after { content:""; flex:1; height:1px; background:#ddd; }
  .divider span { padding:0 10px; }
</style>
</head>
<body>
<div class="auth-card">
  <div class="logo">RetroAI</div>
  <h5 class="text-secondary mb-4">Giriş Yap</h5>

  <!-- Atlassian OAuth -->
  <button class="btn atlassian-btn w-100" onclick="location='/api/auth/atlassian'">
    🟦 Atlassian ile Giriş Yap
  </button>

  <div class="divider"><span>VEYA</span></div>

  <!-- Local form -->
  <form>
    <div class="mb-3">
      <label class="form-label small">Email</label>
      <input type="email" class="form-control" placeholder="email@example.com">
    </div>
    <div class="mb-3">
      <label class="form-label small">Parola</label>
      <input type="password" class="form-control">
    </div>
    <button type="submit" class="btn btn-secondary w-100">Giriş Yap</button>
  </form>

  <hr>
  <p class="text-center mb-0 text-muted small">
    Hesabın yok mu? <a href="02-register.html">Kayıt ol →</a>
  </p>
  <p class="text-center mt-2 text-muted small">
    Misafir olarak retroya katılmak için sana paylaşılan linki kullan.
  </p>
</div>
</body>
</html>
